name: Deploy

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Lambda package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install dependencies into package/
        run: |
          pip install -r requirements.txt -t package/

      - name: Build deployment zip
        run: |
          cd package
          zip -r9 ../function.zip .
          cd ..
          zip -g function.zip lambda_handler.py
          zip -gr function.zip app/

      - name: Upload zip to S3
        run: |
          aws s3 cp function.zip s3://${{ secrets.TF_STATE_BUCKET }}/lambda/function.zip

      - name: Upload zip artifact for deploy job
        uses: actions/upload-artifact@v4
        with:
          name: function-zip
          path: function.zip
          retention-days: 1

  deploy:
    name: Terraform deploy
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"
          terraform_wrapper: false

      - name: Terraform init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Terraform apply
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var="project_name=${{ secrets.PROJECT_NAME }}" \
            -var="aws_region=${{ secrets.AWS_REGION }}" \
            -var="tf_state_bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -var="zip_key=lambda/function.zip"

      - name: Get function URL
        id: get_url
        working-directory: terraform
        run: |
          FUNCTION_URL=$(terraform output -raw function_url)
          # Strip any trailing slash so we can append paths consistently
          FUNCTION_URL="${FUNCTION_URL%/}"
          echo "function_url=${FUNCTION_URL}" >> "$GITHUB_OUTPUT"

      - name: Smoke test - verify app is reachable
        run: |-
          FUNCTION_URL="${{ steps.get_url.outputs.function_url }}"
          echo "Hitting: ${FUNCTION_URL}/health/"
          for i in $(seq 1 10); do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${FUNCTION_URL}/health/")
            echo "Attempt ${i}: HTTP ${HTTP_STATUS}"
            if echo "${HTTP_STATUS}" | grep -qE '^[23][0-9]{2}$'; then
              echo "Smoke test passed with HTTP ${HTTP_STATUS}"
              exit 0
            fi
            sleep 5
          done
          echo "Smoke test FAILED - app did not return 2xx/3xx after 10 attempts"
          exit 1
